<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Cloud - Full Control</title>
    <style>
        body { margin:0; background:#0f0f0f; color: white; font-family: sans-serif; display:flex; flex-direction:column; align-items:center; min-height: 100vh; }
        .screen { display: none; flex-direction: column; align-items: center; width: 100%; padding: 20px; }
        .active-screen { display: flex; }
        
        #slot-list { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; margin-top: 20px; }
        .slot-card { background: #222; border: 2px solid #444; border-radius: 10px; padding: 15px; width: 200px; cursor: pointer; text-align: center; }
        
        .slot-thumbnail { width: 100%; height: 120px; object-fit: contain; background: #000; border: 1px solid #444; margin-bottom: 10px; }
        
        #game-wrapper { width:100%; max-width: 800px; }
        #custom-controls { background: #333; padding: 15px; border-radius: 10px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 10px; }
        
        button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
        #game { width: 100%; height: 60vh; background: #111; }
    </style>
</head>
<body>

<div id="slot-screen" class="screen active-screen">
    <h1>Chọn Slot</h1>
    <div id="slot-list"></div>
</div>

<div id="game-screen" class="screen">
    <div id="game-wrapper">
        <div id="custom-controls">
            <select id="slot-select" onchange="window.currentSaveSlot = this.value">
                <option value="1">Slot 1</option><option value="2">Slot 2</option><option value="3">Slot 3</option>
            </select>
            <button onclick="saveGameDirectly()" style="background:#e91e63; color:white;">💾 LƯU NGAY</button>
            <button onclick="openMenu()" style="background:#4caf50; color:white;">⚙️ MỞ MENU</button>
        </div>
        <div id="game"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

    const firebaseConfig = {
  apiKey: "AIzaSyBOEHzVctDfd73qd5hroJ1IV06vTzGilRs",
  authDomain: "pokemoncloud.firebaseapp.com",
  projectId: "pokemoncloud",
  storageBucket: "pokemoncloud.firebasestorage.app",
  messagingSenderId: "965191766843",
  appId: "1:965191766843:web:a151f03a2b3bd28b055d1e",
  measurementId: "G-E144H92B7S"
};
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth();

    window.currentSaveSlot = 1;

    // Hàm gọi Menu gốc
    window.openMenu = () => {
        const iframe = document.querySelector('iframe');
        if (iframe) iframe.contentWindow.postMessage('openMenu', '*');
    };

    // Hàm lưu game
    window.saveGameDirectly = () => {
        const iframe = document.querySelector('iframe');
        if (iframe) iframe.contentWindow.postMessage('saveState', '*');
    };

    window.uploadStateToCloud = async (stateData, screenshotBase64) => {
        const slot = window.currentSaveSlot;
        const binary = btoa(new Uint8Array(stateData).reduce((data, byte) => data + String.fromCharCode(byte), ''));
        const totalChunks = Math.ceil(binary.length / 800000);
        
        await setDoc(doc(db, "savestates", `${auth.currentUser.uid}_slot_${slot}`), { 
            totalChunks, time: Date.now(), screenshot: screenshotBase64 
        });
        for (let i = 0; i < totalChunks; i++) {
            await setDoc(doc(db, "savestates", `${auth.currentUser.uid}_slot_${slot}_chunk_${i}`), { data: binary.substring(i * 800000, (i + 1) * 800000) });
        }
        alert("Lưu lên Cloud thành công!");
    };
</script>

<script>
    function startEmulator(url) {
        window.EJS_player = '#game';
        window.EJS_core = 'gba';
        window.EJS_gameUrl = 'https://raw.githubusercontent.com/tung55/pkmsource/main/pkmfrsq.gba';
        window.EJS_onSaveState = function(data) {
            let screenBase64 = data.screenshot ? "data:image/png;base64," + btoa(String.fromCharCode(...new Uint8Array(data.screenshot))) : "";
            window.uploadStateToCloud(data.state || data.data, screenBase64);
        };
        const script = document.createElement('script');
        script.src = "https://cdn.emulatorjs.org/stable/data/loader.js";
        document.body.appendChild(script);
    }
    // Gọi startEmulator() sau khi đã chọn Slot...
</script>
</body>
</html>
