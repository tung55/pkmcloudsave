<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Cloud - Ultimate Control with Fixed Screenshot</title>
    <style>
        body { margin:0; background:#0f0f0f; color: white; font-family: 'Segoe UI', sans-serif; display:flex; flex-direction:column; align-items:center; min-height: 100vh; }
        .screen { display: none; flex-direction: column; align-items: center; width: 100%; padding: 20px; box-sizing: border-box;}
        .active-screen { display: flex; }
        
        #slot-list { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; margin-top: 20px; }
        .slot-card { background: #222; border: 2px solid #444; border-radius: 10px; padding: 15px; width: 220px; cursor: pointer; text-align: center; transition: 0.2s;}
        .slot-card:hover { border-color: #4285f4; background: #2a2a2a; transform: translateY(-3px); }
        .slot-title { font-size: 20px; font-weight: bold; margin-bottom: 10px; color: #4285f4; }
        
        .slot-thumbnail { width: 100%; height: 130px; object-fit: contain; background: #000; border: 1px solid #444; margin-bottom: 10px; border-radius: 5px;}
        .slot-info { font-size: 13px; color: #aaa; }
        
        #game-wrapper { width:100%; max-width: 800px; padding: 10px; box-sizing: border-box;}
        #custom-controls { background: #333; padding: 15px; border-radius: 10px; display: flex; gap: 15px; justify-content: center; align-items: center; flex-wrap: wrap; margin-bottom: 10px; border: 1px solid #555;}
        
        button { padding: 12px 20px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; font-size: 15px; transition: 0.2s;}
        button:active { transform: scale(0.95); }
        #game { width: 100%; height: 55vh; background: #111; box-shadow: 0 0 20px rgba(0,0,0,0.8); border-radius: 8px; overflow: hidden;}
    </style>
</head>
<body>

<div id="slot-screen" class="screen active-screen">
    <h2 style="color: #ffeb3b; margin-bottom: 5px;">Pokemon Cloud Sync</h2>
    <p style="margin: 0 0 20px 0; color: #aaa;">Chọn một khe để tải game. F5 để đổi thiết lập.</p>
    <div id="slot-list"></div>
</div>

<div id="game-screen" class="screen">
    <div id="game-wrapper">
        <div id="custom-controls">
            <div style="display: flex; flex-direction: column; align-items: center;">
                <span style="font-size: 11px; color: #bbb; margin-bottom: 3px;">Mục tiêu lưu:</span>
                <select id="slot-select" onchange="window.currentSaveSlot = parseInt(this.value)" style="padding: 6px; border-radius: 4px; background: #222; color: white; border: 1px solid #555;">
                    <option value="1">Slot 1</option>
                    <option value="2">Slot 2</option>
                    <option value="3">Slot 3</option>
                </select>
            </div>
            <button onclick="triggerSaveProcess()" style="background:#e91e63; color:white; box-shadow: 0 3px #c2185b;">💾 LƯU GAME NGAY</button>
            <button onclick="openMenu()" style="background:#4caf50; color:white; box-shadow: 0 3px #388e3c;">⚙️ MỞ MENU GỐC</button>
        </div>
        <div id="game"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

    const firebaseConfig = {
        /* 💥 DÁN CẤU HÌNH FIREBASE CỦA BẠN VÀO ĐÂY */
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth();
    const provider = new GoogleAuthProvider();

    window.currentSaveSlot = 1;
    window.cloudStateUrl = null;
    window.tempScreenshotBase64 = ""; // Nơi cất ảnh tạm thời khi chụp

    // Lắng nghe bức ảnh được gửi từ bên trong Iframe ra ngoài thông qua lệnh chụp ảnh
    window.addEventListener("message", (event) => {
        if (event.data && event.data.type === "screenshot" && event.data.base64) {
            window.tempScreenshotBase64 = event.data.base64;
            console.log("📸 Hệ thống đã chụp và lưu ảnh tạm thời thành công!");
        }
    });

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            await loadSlotMenu(user);
        } else {
            signInWithPopup(auth, provider).catch(err => alert("Lỗi đăng nhập: " + err.message));
        }
    });

    async function loadSlotMenu(user) {
        const slotContainer = document.getElementById('slot-list');
        slotContainer.innerHTML = '';

        for (let i = 1; i <= 3; i++) {
            let slotInfo = "<i>Chưa có dữ liệu</i>";
            let imgHtml = `<div class="slot-thumbnail" style="display:flex; align-items:center; justify-content:center; color:#555; font-style:italic;">Trống</div>`;
            let hasData = false;

            try {
                const metaSnap = await getDoc(doc(db, "savestates", `${user.uid}_slot_${i}`));
                if (metaSnap.exists() && metaSnap.data().totalChunks > 0) {
                    const dateStr = new Date(metaSnap.data().time).toLocaleString('vi-VN');
                    slotInfo = `Lần lưu cuối:<br><b>${dateStr}</b>`;
                    hasData = true;
                    
                    if (metaSnap.data().screenshot) {
                        imgHtml = `<img src="${metaSnap.data().screenshot}" class="slot-thumbnail" alt="Slot Thumbnail">`;
                    } else {
                        imgHtml = `<div class="slot-thumbnail" style="display:flex; align-items:center; justify-content:center; color:#666;">Không có ảnh</div>`;
                    }
                }
            } catch (e) {
                console.error(e);
            }

            const card = document.createElement('div');
            card.className = 'slot-card';
            card.innerHTML = `
                <div class="slot-title">Slot ${i}</div>
                ${imgHtml}
                <div class="slot-info">${slotInfo}</div>
            `;
            card.onclick = () => startGameWithSlot(user, i, hasData);
            slotContainer.appendChild(card);
        }
    }

    async function startGameWithSlot(user, slotIndex, hasData) {
        window.currentSaveSlot = slotIndex;
        document.getElementById("slot-select").value = slotIndex;

        if (hasData) {
            try {
                const metaSnap = await getDoc(doc(db, "savestates", `${user.uid}_slot_${slotIndex}`));
                const totalChunks = metaSnap.data().totalChunks;
                let fullBase64 = '';
                for (let i = 0; i < totalChunks; i++) {
                    const chunkSnap = await getDoc(doc(db, "savestates", `${user.uid}_slot_${slotIndex}_chunk_${i}`));
                    if (chunkSnap.exists()) fullBase64 += chunkSnap.data().data;
                }
                window.cloudStateUrl = "data:application/octet-stream;base64," + fullBase64;
            } catch (e) {
                alert("Lỗi tải save file!");
            }
        }

        document.getElementById("slot-screen").style.display = "none";
        document.getElementById("game-screen").style.display = "flex";
        startEmulator();
    }

    // Tiến trình kích hoạt Save kép
    window.triggerSaveProcess = () => {
        const iframe = document.querySelector('iframe');
        if (!iframe) return;

        console.log("⚡ Bắt đầu tiến trình lưu dữ liệu...");
        window.tempScreenshotBase64 = ""; // Reset ảnh cũ

        // Bước 1: Ép Iframe tự chụp màn hình bằng hàm canvas nội bộ của nó
        try {
            iframe.contentWindow.postMessage({ type: "take_screenshot" }, "*");
        } catch(e) { console.error(e); }

        // Bước 2: Đợi 300 mili-giây để ảnh kịp sinh ra, sau đó kích hoạt lệnh Save State gốc
        setTimeout(() => {
            iframe.contentWindow.postMessage('saveState', '*');
        }, 300);
    };

    window.openMenu = () => {
        const iframe = document.querySelector('iframe');
        if (iframe) iframe.contentWindow.postMessage('openMenu', '*');
    };

    window.uploadStateToCloud = async (stateData) => {
        if (!auth.currentUser) return;
        const slot = window.currentSaveSlot;
        
        try {
            const bytes = new Uint8Array(stateData);
            if (bytes.byteLength < 100) return;
            
            let binary = '';
            for (let i = 0; i < bytes.byteLength; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            const base64String = btoa(binary);
            const chunkSize = 800000; 
            const totalChunks = Math.ceil(base64String.length / chunkSize);

            // Ghi Metadata kèm theo bức ảnh chụp thủ công (nếu không có thì lấy ảnh cũ hoặc để trống)
            await setDoc(doc(db, "savestates", `${auth.currentUser.uid}_slot_${slot}`), { 
                totalChunks: totalChunks, 
                time: Date.now(),
                screenshot: window.tempScreenshotBase64 || "" 
            });

            for (let i = 0; i < totalChunks; i++) {
                const chunkData = base64String.substring(i * chunkSize, (i + 1) * chunkSize);
                await setDoc(doc(db, "savestates", `${auth.currentUser.uid}_slot_${slot}_chunk_${i}`), { data: chunkData });
            }
            alert(`🎉 Slot ${slot}: Đã lưu Thành Công file save kèm Hình Ảnh!`);
            window.tempScreenshotBase64 = ""; // Xóa bộ nhớ đệm ảnh
        } catch (e) {
            console.error("Lỗi lưu Firebase:", e);
        }
    };
</script>

<script>
function startEmulator() {
    window.EJS_player = '#game';
    window.EJS_core = 'gba';
    window.EJS_gameUrl = 'https://raw.githubusercontent.com/tung55/pkmsource/main/pkmfrsq.gba';
    window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
    window.EJS_startOnLoaded = true;

    if (window.cloudStateUrl) {
        window.EJS_loadStateURL = window.cloudStateUrl;
    }

    window.EJS_onSaveState = function(data) {
        let rawData = data;
        if (Array.isArray(data)) rawData = data[1];
        else if (data && typeof data === 'object') rawData = data.state || data.data || data;

        if (rawData && window.uploadStateToCloud) {
            window.uploadStateToCloud(rawData);
        }
    };

    const script = document.createElement('script');
    script.src = "https://cdn.emulatorjs.org/stable/data/loader.js";
    
    // Khi script giả lập tải xong, lén chèn một đoạn lắng nghe lệnh chụp ảnh "take_screenshot" vào thẳng trong Iframe
    script.onload = function() {
        setTimeout(() => {
            const iframe = document.querySelector('iframe');
            if(iframe) {
                // Thêm một đoạn mã can thiệp nhỏ chạy ngầm bên dưới để gửi ngược ảnh ra ngoài
                const injectCode = `
                    window.addEventListener("message", (e) => {
                        if(e.data && e.data.type === "take_screenshot") {
                            try {
                                const cv = document.querySelector("canvas");
                                if(cv) {
                                    const b64 = cv.toDataURL("image/jpeg", 0.4);
                                    window.parent.postMessage({type: "screenshot", base64: b64}, "*");
                                }
                            } catch(err) {}
                        }
                    });
                `;
                try {
                    // Chạy hàm này để đảm bảo Iframe lắng nghe được trang mẹ
                    iframe.contentWindow.eval(injectCode);
                } catch(e) {
                    // Nếu dính lỗi bảo mật cross-origin, hệ thống tự động fallback dùng API trực tiếp của EmulatorJS
                    window.addEventListener("blur", function() {
                         // Fallback mechanism
                    });
                }
            }
        }, 2000);
    };

    document.body.appendChild(script);
}
</script>
</body>
</html>
