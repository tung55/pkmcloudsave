<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Pokemon Cloud Sync - The Final Cut</title>
    <style>
        body { margin:0; background:black; display:flex; flex-direction:column; align-items:center; justify-content:center; color: white; font-family: sans-serif; height: 100vh; }
        #user-profile { position: fixed; top: 10px; right: 10px; background: rgba(255, 255, 255, 0.1); padding: 10px; border-radius: 8px; display: none; align-items: center; z-index: 100; }
        #game { width:80%; height:70vh; max-width: 800px; margin-top: 50px; background: #111; } 
        #login-ui, #loading-ui { text-align: center; }
        button { padding: 15px 30px; cursor: pointer; background: #4285f4; color: white; border: none; border-radius: 5px; font-size: 18px; font-weight: bold;}
        .logout-btn { background:#ff4444; margin-left:10px; padding:8px 12px; font-size:14px; border:none; border-radius:4px; color:white; cursor:pointer; }
    </style>
</head>
<body>

<div id="user-profile">
    <span id="user-email"></span>
    <button class="logout-btn" onclick="handleLogout()">Đăng xuất</button>
</div>

<div id="login-ui">
    <h2>Pokemon - Save State Cloud</h2>
    <button id="btn-login">Đăng nhập Google</button>
</div>

<div id="loading-ui" style="display: none;">
    <h2>⏳ Đang tải và giải mã dữ liệu Save State từ Firebase...</h2>
</div>

<div id="game"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

    const firebaseConfig = {
  apiKey: "AIzaSyBOEHzVctDfd73qd5hroJ1IV06vTzGilRs",
  authDomain: "pokemoncloud.firebaseapp.com",
  projectId: "pokemoncloud",
  storageBucket: "pokemoncloud.firebasestorage.app",
  messagingSenderId: "965191766843",
  appId: "1:965191766843:web:a151f03a2b3bd28b055d1e",
  measurementId: "G-E144H92B7S"
};

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth();
    const provider = new GoogleAuthProvider();

    window.handleLogout = () => {
        signOut(auth).then(() => window.location.reload());
    };

    document.getElementById("btn-login").addEventListener("click", () => {
        signInWithPopup(auth, provider).catch(err => alert("Lỗi đăng nhập: " + err.message));
    });

    let emulatorStarted = false;
    window.cloudStateUrl = null; 

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            document.getElementById("login-ui").style.display = "none";
            document.getElementById("loading-ui").style.display = "block";
            document.getElementById("user-profile").style.display = "flex";
            document.getElementById("user-email").innerText = user.email;

            if (!emulatorStarted) {
                emulatorStarted = true;
                try {
                    const metaSnap = await getDoc(doc(db, "savestates", user.uid));
                    if (metaSnap.exists()) {
                        const totalChunks = metaSnap.data().totalChunks;
                        
                        // Lọc loại bỏ lỗi 0 mảnh
                        if (totalChunks > 0) {
                            let fullBase64 = '';
                            console.log(`☁️ Đang kéo ${totalChunks} mảnh Save State từ Firebase...`);
                            
                            for (let i = 0; i < totalChunks; i++) {
                                const chunkSnap = await getDoc(doc(db, "savestates", `${user.uid}_chunk_${i}`));
                                if (chunkSnap.exists()) fullBase64 += chunkSnap.data().data;
                            }
                            
                            // Gắn dữ liệu thẳng vào Data URI để vượt rào cản Web Worker
                            window.cloudStateUrl = "data:application/octet-stream;base64," + fullBase64;
                            console.log("✅ Đã ráp xong file Save State (chuẩn Data URI) sẵn sàng nạp!");
                        } else {
                            console.log("☁️ Dữ liệu trên mây bị rỗng (0 mảnh). Đã tự động bỏ qua để tránh lỗi game.");
                        }
                    }
                } catch (e) { 
                    console.error("Lỗi đồng bộ mây:", e); 
                } finally {
                    document.getElementById("loading-ui").style.display = "none";
                    startEmulator();
                }
            }
        } else {
            document.getElementById("login-ui").style.display = "block";
            document.getElementById("user-profile").style.display = "none";
        }
    });

    window.uploadStateToCloud = async (stateData) => {
        if (!auth.currentUser) return;
        
        try {
            const bytes = new Uint8Array(stateData);
            
            // Chặn đứng các file rác/rỗng để không tạo ra dữ liệu 0 mảnh
            if (bytes.byteLength < 100) {
                console.error("❌ Lỗi: Dữ liệu quá nhỏ hoặc rỗng. Giả lập cung cấp file lỗi.");
                return;
            }
            
            console.log(`⚡ Đang băm nhỏ file Save State (${(bytes.byteLength / 1024 / 1024).toFixed(2)} MB)...`);
            
            let binary = '';
            for (let i = 0; i < bytes.byteLength; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            const base64String = btoa(binary);

            const chunkSize = 800000; 
            const totalChunks = Math.ceil(base64String.length / chunkSize);

            // Ghi nhận tổng số mảnh
            await setDoc(doc(db, "savestates", auth.currentUser.uid), { 
                totalChunks: totalChunks, 
                time: Date.now() 
            });

            // Gửi từng mảnh lên Firebase
            for (let i = 0; i < totalChunks; i++) {
                const chunkData = base64String.substring(i * chunkSize, (i + 1) * chunkSize);
                await setDoc(doc(db, "savestates", `${auth.currentUser.uid}_chunk_${i}`), { data: chunkData });
                console.log(`⬆️ Upload xong mảnh ${i + 1}/${totalChunks}`);
            }
            console.log("🎉 FIREBASE ĐÃ LƯU TRỮ TRỌN VẸN STATE!");
        } catch (e) {
            console.error("❌ Firebase từ chối lưu:", e);
        }
    };
</script>

<script>
function startEmulator() {
    window.EJS_player = '#game';
    window.EJS_core = 'gba';
    window.EJS_gameUrl = 'https://raw.githubusercontent.com/tung55/pkmsource/main/pkmfrsq.gba';
    window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
    window.EJS_startOnLoaded = true;

    // Nạp link Data URI vào cho giả lập nếu trên mây có dữ liệu
    if (window.cloudStateUrl) {
        window.EJS_loadStateURL = window.cloudStateUrl; // SỬA TÊN BIẾN Ở ĐÂY LÀ XONG!
    }

    // Bắt sự kiện tạo file và rà soát kỹ định dạng mảng
    window.EJS_onSaveState = function(data) {
        console.log("📸 Bắt được tín hiệu Save State! Dữ liệu thô là:", data);
        
        let rawData = null;
        if (data instanceof Uint8Array) {
            rawData = data;
        } else if (data && data.state instanceof Uint8Array) {
            rawData = data.state;
        } else if (data && data.data instanceof Uint8Array) {
            rawData = data.data;
        } else if (data) {
            rawData = data.state || data.data || data; 
        }

        // Chỉ cho phép upload nếu dữ liệu mảng hợp lệ
        if (rawData && rawData.byteLength > 100 && window.uploadStateToCloud) {
            window.uploadStateToCloud(rawData);
        } else {
            console.error("❌ Báo động: Giả lập trả về dữ liệu rỗng hoặc không hợp lệ, không upload lên Cloud!");
        }
    };

    const script = document.createElement('script');
    script.src = "https://cdn.emulatorjs.org/stable/data/loader.js";
    document.body.appendChild(script);
}
</script>
</body>
</html>
